<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background (Optional, good for app icon) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="#0F172A" stroke="#334155" stroke-width="8"/>

  <!-- The Bar -->
  <rect x="96" y="216" width="320" height="80" rx="24" fill="url(#grad1)" filter="url(#glow)"/>

  <!-- The Snap Bolt -->
  <path d="M288 80 L230 230 L310 230 L210 440 L260 280 L180 280 L288 80 Z" 
        fill="#FBBF24" 
        stroke="#0F172A" 
        stroke-width="12" 
        stroke-linejoin="round"/>
</svg>
